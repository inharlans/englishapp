name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: englishapp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d englishapp"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 8
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/englishapp?schema=public
      AUTH_SECRET: ci-auth-secret-please-change
      AUTH_BOOTSTRAP_TOKEN: ci-bootstrap-token
      E2E_BASE_URL: http://127.0.0.1:3000
      E2E_EMAIL: admin@example.com
      E2E_PASSWORD: change-me-now-123
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate
      - run: npm run prisma:deploy
      - run: npm run typecheck
      - run: npm run build
      - run: npm run test
      - run: npm run start -- --hostname 127.0.0.1 --port 3000 > /tmp/next-start.log 2>&1 &
      - run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3000/login > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Server failed to start"
          cat /tmp/next-start.log
          exit 1
      - run: npm run test:e2e
      - run: npm run ops:readiness
