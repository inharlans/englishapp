name: Scheduled Internal Cron Jobs

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  run-cron-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Validate secrets
        run: |
          missing=0
          if [ -z "${{ secrets.APP_BASE_URL }}" ]; then
            echo "Missing required secret: APP_BASE_URL"
            missing=1
          fi
          if [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "Missing required secret: CRON_SECRET"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            echo "Configure repository secrets in: Settings > Secrets and variables > Actions"
            exit 1
          fi
      - name: Run plan-expire cron
        run: |
          set -euo pipefail
          url="${{ secrets.APP_BASE_URL }}/api/internal/cron/plan-expire"
          status=$(curl --silent --show-error --location \
            --connect-timeout 10 \
            --max-time 90 \
            --request POST "$url" \
            --header "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --header "Content-Type: application/json" \
            --output /tmp/cron-plan-expire-body.txt \
            --write-out "%{http_code}")
          echo "plan-expire status=$status url=$url"
          cat /tmp/cron-plan-expire-body.txt || true
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "plan-expire failed (status=$status)"
            exit 1
          fi
      - name: Run wordbook-rank cron
        run: |
          set -euo pipefail
          url="${{ secrets.APP_BASE_URL }}/api/internal/cron/wordbook-rank"
          status=$(curl --silent --show-error --location \
            --connect-timeout 10 \
            --max-time 90 \
            --request POST "$url" \
            --header "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --header "Content-Type: application/json" \
            --output /tmp/cron-wordbook-rank-body.txt \
            --write-out "%{http_code}")
          echo "wordbook-rank status=$status url=$url"
          cat /tmp/cron-wordbook-rank-body.txt || true
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "wordbook-rank failed (status=$status)"
            exit 1
          fi
      - name: Run clipper-enrichment cron
        run: |
          set -euo pipefail
          url="${{ secrets.APP_BASE_URL }}/api/internal/cron/clipper-enrichment"
          status=$(curl --silent --show-error --location \
            --connect-timeout 10 \
            --max-time 600 \
            --request POST "$url" \
            --header "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --header "Content-Type: application/json" \
            --output /tmp/cron-clipper-enrichment-body.txt \
            --write-out "%{http_code}")
          echo "clipper-enrichment status=$status url=$url"
          cat /tmp/cron-clipper-enrichment-body.txt || true
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "clipper-enrichment failed (status=$status)"
            exit 1
          fi
