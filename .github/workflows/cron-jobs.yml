name: Scheduled Internal Cron Jobs

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  run-cron-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Validate secrets
        run: |
          missing=0
          if [ -z "${{ secrets.APP_BASE_URL }}" ]; then
            echo "Missing required secret: APP_BASE_URL"
            missing=1
          fi
          if [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "Missing required secret: CRON_SECRET"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            echo "Configure repository secrets in: Settings > Secrets and variables > Actions"
            exit 1
          fi
      - name: Run plan-expire cron
        run: |
          curl --fail --show-error --silent \
            -X POST "${{ secrets.APP_BASE_URL }}/api/internal/cron/plan-expire" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
      - name: Run wordbook-rank cron
        run: |
          curl --fail --show-error --silent \
            -X POST "${{ secrets.APP_BASE_URL }}/api/internal/cron/wordbook-rank" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
